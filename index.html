<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hiên Chữ Thi - Quản Lý Dễ Dàng</title>
    <style>
        /* T giữ nguyên màu sắc cũ của m cho đẹp */
        :root { --main: #8b5e3c; --bg: #fdfaf5; --text: #4a4a4a; }
        body { font-family: 'Segoe UI', Tahoma; background: var(--bg); color: var(--text); margin: 0; }
        nav { background: #fff; padding: 15px; display: flex; justify-content: center; gap: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        nav a { text-decoration: none; color: var(--text); font-weight: bold; cursor: pointer; }
        .container { max-width: 1000px; margin: 30px auto; padding: 20px; }
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .book-card { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .book-card img { width: 100%; border-radius: 4px; height: 250px; object-fit: cover; }
        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <a onclick="show('home')">Trang Chủ</a>
    <a onclick="show('ke-sach')">Kệ Sách Đã Tỏ</a>
    <a onclick="show('ai-chat')">Tìm Sách Cùng AI</a>
</nav>

<div class="container">
    <div id="home" class="section">
        <h1>Chào mừng m đến với Hiên Chữ Thi</h1>
        <p>Đây là góc nhỏ của t.</p>
    </div>

    <div id="ke-sach" class="section hidden">
        <h2>Kệ Sách Của T</h2>
        <div id="grid-sach" class="book-grid">
            </div>
    </div>

    <div id="ai-chat" class="section hidden">
        <h2>Chatbox AI</h2>
        <p>Tính năng đang phát triển...</p>
    </div>
</div>

<script>
    /* ==========================================================
       CHỖ ĐỂ M SỬA NÈ - BỮA SAU VÀO ĐÂY GÕ CHỮ THÔI
       ========================================================== */
    const danhSachSach = [
        {
            ten: "Đắc Nhân Tâm",
            hinh: "https://pibook.vn/upload/product/dac-nhan-tam-bia-cung.jpg",
            review: "Cuốn sách gối đầu giường của mọi thời đại."
        },
        {
            ten: "Nhà Giả Kim",
            hinh: "https://vnn-imgs-f.vgcloud.vn/2020/09/08/11/nha-gia-kim.jpg",
            review: "Hành trình đi tìm vận mệnh của chính mình."
        },
        // M muốn thêm sách thì cứ Copy 1 cụm { ... } rồi dán xuống dưới này
    ];

    /* ==========================================================
       CODE TỰ ĐỘNG - ĐỪNG ĐỤNG VÀO ĐỐNG NÀY
       ========================================================== */
    function loadSach() {
        const grid = document.getElementById('grid-sach');
        grid.innerHTML = danhSachSach.map(sach => `
            <div class="book-card">
                <img src="${sach.hinh}" alt="${sach.ten}">
                <h3>${sach.ten}</h3>
                <p>${sach.review}</p>
            </div>
        `).join('');
    }

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'ke-sach') loadSach();
    }
</script>

</body>
</html>
